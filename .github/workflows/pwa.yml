name: Deploy Companion PWA

on:
  push:
    branches: [main]
    paths:
      - "apps/companion-pwa/**"
      - ".github/workflows/pwa.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/companion-pwa/package.json

      - name: Install dependencies
        working-directory: apps/companion-pwa
        run: npm install

      - name: Build PWA
        working-directory: apps/companion-pwa
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/companion-pwa/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
