<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#1a1a2e"/>

  <!-- Circle of friends: ring r=120, center (256,240)
       Top:         (256, 120)
       Bottom-right:(359.9, 300)
       Bottom-left: (152.1, 300)
  -->
  <!-- Arc 1: top → bottom-right -->
  <path d="M256,120 A120,120 0 0,1 359.9,300" fill="none" stroke="#e94560" stroke-width="20" stroke-linecap="round"/>
  <!-- Arc 2: bottom-right → bottom-left -->
  <path d="M359.9,300 A120,120 0 0,1 152.1,300" fill="none" stroke="#e94560" stroke-width="20" stroke-linecap="round"/>
  <!-- Arc 3: bottom-left → top -->
  <path d="M152.1,300 A120,120 0 0,1 256,120" fill="none" stroke="#e94560" stroke-width="20" stroke-linecap="round"/>

  <!-- Node dots at each arc end: r=17 -->
  <circle cx="256"   cy="120" r="17" fill="#e94560"/>
  <circle cx="359.9" cy="300" r="17" fill="#e94560"/>
  <circle cx="152.1" cy="300" r="17" fill="#e94560"/>

  <!-- Center ring: outer r=27, inner r=15 -->
  <circle cx="256" cy="240" r="27" fill="#e94560"/>
  <circle cx="256" cy="240" r="15" fill="#1a1a2e"/>

  <!-- Chat bubble: body -->
  <rect x="176" y="342" width="178" height="98" rx="24" fill="#e94560"/>
  <!-- Tail: points bottom-left, attached cleanly to bottom of rect -->
  <polygon points="200,428 174,470 238,428" fill="#e94560"/>
  <!-- Content lines -->
  <rect x="200" y="366" width="130" height="11" rx="5.5" fill="#1a1a2e" opacity="0.5"/>
  <rect x="200" y="387" width="98"  height="11" rx="5.5" fill="#1a1a2e" opacity="0.38"/>
  <rect x="200" y="408" width="114" height="11" rx="5.5" fill="#1a1a2e" opacity="0.28"/>
</svg>
